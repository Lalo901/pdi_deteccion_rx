services:
  app:
    build: .
    container_name: dicom_console_mvp
    ports:
      - "7860:7860"
    volumes:
      - .:/app
      - /app/.venv  # Evitar que el entorno virtual local pise el del contenedor
    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
